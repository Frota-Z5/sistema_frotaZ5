<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veiculos</title>
    <link rel="stylesheet" href="/css/inicial_sistema.css">
    
</head>
<body>
    <header>
        <div> <a href="/index.html"><img src="/img/logo.png" alt="FrotaZ5"> </a> </div>
            
        <button> <a href="/Pagina de Cadastro/index_cadastro.html">Voltar</a> </button>
        <button> <a href="/index.html">Sair do Sistema</a> </button>
            
    </header>
    <main>
        <fieldset>
            <legend><strong> <h2>Cadastro de Veículos </h2> </strong></legend>
            <section>
                <h4>Marca</h4>
                <input type="text" placeholder="Marca">
            </section>
            <section>
                <h4>Modelo</h4>
                <input type="text" placeholder="Modelo">
            </section>
            <section>
                <h4>Placa</h4>
                <input type="text" placeholder="Placa">
            </section>
            <section>
                <h4>Chassi</h4>
                <input type="text" placeholder="Chassi">
            </section>
            <section>
                <h4>Renavam</h4>
                <input type="text" placeholder="Renavam">
            </section>
            <section>
                <h4>Cor</h4>
                <input type="text" placeholder="Cor">
            </section>
            <section>
                <h4>Ano de Fabricação</h4>
                <input type="text" placeholder="Ano de Fabricação">
            </section>
            <section>
                <h4>Capacidade de Carga</h4>
                <input type="text" placeholder="Capacidade de Carga">
            </section>
            <section>
                <h4>Proprietário</h4>
                <select>
                    <option value="">Proprietário</option>
                    <option>Proprio</option>
                    <option>Terceiro</option>
                </select>
            </section>
            <section>
                <h4>Eixos</h4>
                <select>
                    <option value="">Eixos</option>
                    <option>1</option>
                    <option>2</option>
                    <option>3</option>
                    <option>4</option>
                </select>
            </section>
        </fieldset>
    </main>
    
    <footer>
        <p>Frota Z5</p>
        <p>©2025 - Todos os direitos reservados</p>
    </footer>
</body>
</html>
