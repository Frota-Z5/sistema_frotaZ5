<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veiculos</title>
    <link rel="stylesheet" href="/Menu_suspenso/Estilo_menu.css">
</head>
<body>
    <header>
        
    </header>
    <main>
        <fieldset>
            <legend><strong>Cadastro de Veículos</strong></legend>
            <section>
                <h4>Marca</h4>
                <input type="text" placeholder="Marca">
            </section>
            <section>
                <h4>Modelo</h4>
                <input type="text" placeholder="Modelo">
            </section>
            <section>
                <h4>Placa</h4>
                <input type="text" placeholder="Placa">
            </section>
            <section>
                <h4>Chassi</h4>
                <input type="text" placeholder="Chassi">
            </section>
            <section>
                <h4>Renavam</h4>
                <input type="text" placeholder="Renavam">
            </section>
            <section>
                <h4>Cor</h4>
                <input type="text" placeholder="Cor">
            </section>
            <section>
                <h4>Ano de Fabricação</h4>
                <input type="text" placeholder="Ano de Fabricação">
            </section>
            <section>
                <h4>Capacidade de Carga</h4>
                <input type="text" placeholder="Capacidade de Carga">
            </section>
            <section>
                <h4>Proprietário</h4>
                <select>
                    <option value="">Proprietário</option>
                    <option>Proprio</option>
                    <option>Terceiro</option>
                </select>
            </section>
            <section>
                <h4>Eixos</h4>
                <select>
                    <option value="">Eixos</option>
                    <option>1</option>
                    <option>2</option>
                    <option>3</option>
                    <option>4</option>
                </select>
            </section>
        </fieldset>
    </main>
    
    <footer>

    </footer>
</body>
</html>
